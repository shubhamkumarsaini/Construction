{% extends "base2.html" %}

{% block title %}Add Party{% endblock %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <h3>➕ Add Party</h3>

    <a href="/party/list/" class="btn btn-secondary">
        <i class="fas fa-arrow-left me-1"></i> Back
    </a>
</div>

<div class="card p-4">

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label>Name</label>
            {{ form.name }}
        </div>

        <div class="mb-3">
            <label>Phone</label>
            {{ form.phone }}
        </div>

        <div class="mb-3">
            <label>Address</label>
            {{ form.address }}
        </div>

        <button class="btn btn-primary">Save</button>
    </form>

</div>

{% endblock %}
