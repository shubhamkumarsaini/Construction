{% extends "base.html" %}

{% block custom_css %}
<style>
    body {
        background: #f5f7fa;
    }

    .sidebar {
        position: fixed;
        top: 56px;
        left: 0;
        height: calc(100vh - 56px);
        width: 240px;
        background: #2c3e50;
        color: #fff;
        padding-top: 20px;
        overflow-y: auto;
    }

    .sidebar h4 {
        font-weight: bold;
        text-align: center;
        margin-bottom: 20px;
    }

    .sidebar a {
        display: block;
        color: #ecf0f1;
        padding: 12px 20px;
        text-decoration: none;
        transition: 0.3s;
    }

    .sidebar a:hover {
        background: #34495e;
        padding-left: 25px;
    }

    .main-content {
        margin-left: 240px;
        margin-top: 70px;
        padding: 25px;
    }

    .card {
        border-radius: 15px;
        border: none;
        box-shadow: 0 6px 18px rgba(0,0,0,0.08);
        transition: 0.3s;
    }

    .card:hover {
        transform: translateY(-5px);
    }

    .form-check-input {
        width: 20px;
        height: 20px;
        cursor: pointer;
    }
</style>
{% endblock %}

{% block body %}

<!-- 🔥 Sidebar -->
<div class="sidebar">
    <a href="/"><h4>🏗️ CMS</h4></a>
    <a href="/dashboard"><i class="fas fa-home me-2"></i> Dashboard</a>
    <a href="/purchase_list/"><i class="fas fa-shopping-cart me-2"></i> Purchase</a>
    <a href="/processing/list/"><i class="fas fa-cogs me-2"></i> Processing</a>
    <a href="{% url 'stock' %}"><i class="fas fa-box me-2"></i> Stock</a>
    <a href="/party/list/"><i class="fas fa-users me-2"></i> Party</a>
    <a href="/transaction/"><i class="fas fa-money-bill me-2"></i> Transaction</a>
    <a href="/sales/list/"><i class="fas fa-file-invoice me-2"></i> Sales</a>
    <a href="/employee/list/"><i class="fas fa-users me-2"></i> Employee</a>
    <a href="/attendance/"><i class="fas fa-calendar-check me-2"></i> Attendance</a>
    <a href="{% url 'salary_list' %}"><i class="fas fa-wallet me-2"></i> Salary</a>
    <a href="{% url 'kitchen_expense' %}"><i class="fas fa-utensils me-2"></i> Kitchen</a>
    <a href="{% url 'logout' %}"><i class="fas fa-sign-out-alt me-2"></i> Logout</a>
</div>

<!-- 🔥 Main Content -->
<div class="main-content">
    {% block content %}
    {% endblock %}
</div>

{% endblock %}
